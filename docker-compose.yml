version: '3.8'

services:
  # Frontend Vue.js Application
  frontend:
    build:
      context: ./frontend-vue
      dockerfile: ../infrastructure/docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000
      - VITE_CLERK_PUBLIC_KEY=${VITE_CLERK_PUBLIC_KEY}
    depends_on:
      - backend
    networks:
      - ai-cv-optimizer-network
    volumes:
      - frontend_node_modules:/app/node_modules
    restart: unless-stopped

  # Backend Node.js API Gateway
  backend:
    build:
      context: ./backend-node
      dockerfile: ../infrastructure/docker/Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - FLASK_ML_SERVICE_URL=http://ml-service:5001
      - REDIS_URL=redis://redis:6379
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - FROM_EMAIL=${FROM_EMAIL}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
    depends_on:
      - redis
      - ml-service
    networks:
      - ai-cv-optimizer-network
    volumes:
      - backend_node_modules:/app/node_modules
      - ./backend-node/logs:/app/logs
      - ./backend-node/uploads:/app/uploads
    restart: unless-stopped

  # ML Service Flask
  ml-service:
    build:
      context: ./ml-service-flask
      dockerfile: ../infrastructure/docker/Dockerfile.ml
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=True
      - PORT=5001
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-3.5-turbo
      - REDIS_URL=redis://redis:6379
      - MODEL_PATH=/app/models
      - SPACY_MODEL=en_core_web_sm
      - SENTENCE_TRANSFORMER_MODEL=all-MiniLM-L6-v2
      - MAX_FILE_SIZE=10485760
      - SUPPORTED_LANGUAGES=en,fr,es,de,it,pt
      - DEFAULT_LANGUAGE=en
      - LOG_LEVEL=INFO
      - RATE_LIMIT=100/hour
      - CACHE_TYPE=redis
      - CACHE_DEFAULT_TIMEOUT=3600
    depends_on:
      - redis
    networks:
      - ai-cv-optimizer-network
    volumes:
      - ml_service_models:/app/models
      - ml_service_logs:/app/logs
      - ml_service_uploads:/app/uploads
    restart: unless-stopped

  # Redis Cache and Queue
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    networks:
      - ai-cv-optimizer-network
    volumes:
      - redis_data:/data
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf
    restart: unless-stopped

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - ai-cv-optimizer-network
    restart: unless-stopped

  # Monitoring with Prometheus (Optional)
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - ai-cv-optimizer-network
    restart: unless-stopped

  # Monitoring with Grafana (Optional)
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboard.json:/etc/grafana/provisioning/dashboards/dashboard.json
    depends_on:
      - prometheus
    networks:
      - ai-cv-optimizer-network
    restart: unless-stopped

networks:
  ai-cv-optimizer-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  frontend_node_modules:
  backend_node_modules:
  ml_service_models:
  ml_service_logs:
  ml_service_uploads:
  redis_data:
  prometheus_data:
  grafana_data:
