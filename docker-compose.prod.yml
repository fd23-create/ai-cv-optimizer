version: '3.8'

services:
  # Frontend Vue.js Application (Production)
  frontend:
    build:
      context: ./frontend-vue
      dockerfile: ../infrastructure/docker/Dockerfile.frontend
      target: production
    environment:
      - NODE_ENV=production
      - VITE_API_URL=https://api.your-domain.com
      - VITE_CLERK_PUBLIC_KEY=${VITE_CLERK_PUBLIC_KEY}
    depends_on:
      - backend
    networks:
      - ai-cv-optimizer-network
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Backend Node.js API Gateway (Production)
  backend:
    build:
      context: ./backend-node
      dockerfile: ../infrastructure/docker/Dockerfile.backend
      target: production
    environment:
      - NODE_ENV=production
      - PORT=5000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - FLASK_ML_SERVICE_URL=http://ml-service:5001
      - REDIS_URL=redis://redis:6379
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - FROM_EMAIL=${FROM_EMAIL}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - LOG_LEVEL=info
    depends_on:
      - redis
      - ml-service
    networks:
      - ai-cv-optimizer-network
    volumes:
      - ./backend-node/logs:/app/logs
      - ./backend-node/uploads:/app/uploads
    restart: unless-stopped
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ML Service Flask (Production)
  ml-service:
    build:
      context: ./ml-service-flask
      dockerfile: ../infrastructure/docker/Dockerfile.ml
      target: production
    environment:
      - FLASK_ENV=production
      - PORT=5001
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-3.5-turbo
      - REDIS_URL=redis://redis:6379
      - MODEL_PATH=/app/models
      - SPACY_MODEL=en_core_web_sm
      - SENTENCE_TRANSFORMER_MODEL=all-MiniLM-L6-v2
      - MAX_FILE_SIZE=10485760
      - SUPPORTED_LANGUAGES=en,fr,es,de,it,pt
      - DEFAULT_LANGUAGE=en
      - LOG_LEVEL=info
      - RATE_LIMIT=100/hour
      - CACHE_TYPE=redis
      - CACHE_DEFAULT_TIMEOUT=3600
    depends_on:
      - redis
    networks:
      - ai-cv-optimizer-network
    volumes:
      - ml_service_models:/app/models
      - ml_service_logs:/app/logs
      - ml_service_uploads:/app/uploads
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache and Queue (Production)
  redis:
    image: redis:7-alpine
    command: redis-server /usr/local/etc/redis/redis.conf --appendonly yes
    networks:
      - ai-cv-optimizer-network
    volumes:
      - redis_data:/data
      - ./infrastructure/redis/redis.prod.conf:/usr/local/etc/redis/redis.conf
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.prod.conf:/etc/nginx/nginx.conf
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl
      - ./infrastructure/nginx/logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - ai-cv-optimizer-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # Monitoring with Prometheus (Production)
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus/prometheus.prod.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - ai-cv-optimizer-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Monitoring with Grafana (Production)
  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboard.prod.json:/etc/grafana/provisioning/dashboards/dashboard.json
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - ai-cv-optimizer-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Log Aggregation with Loki (Production)
  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - ai-cv-optimizer-network
    restart: unless-stopped

  # Promtail for log collection
  promtail:
    image: grafana/promtail:latest
    volumes:
      - ./monitoring/promtail/promtail.yml:/etc/promtail/config.yml
      - ./backend-node/logs:/var/log/backend
      - ./ml-service-flask/logs:/var/log/ml-service
      - /var/log/nginx:/var/log/nginx
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - ai-cv-optimizer-network
    restart: unless-stopped

networks:
  ai-cv-optimizer-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

volumes:
  ml_service_models:
  ml_service_logs:
  ml_service_uploads:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
